    # Example hyprlock.conf
    background {
        path = /home/mukund/wall/wallhaven-3qqqkv.jpg 
        blur_passes = 3
        color = 0x111111FF
    }

    input-field {
        monitor =
        size = 200, 50
        outline_thickness = 3
        inner_color = 0x333333DD
        outer_color = 0x888888AA
        font_color = 0xDDDDDDFF
        fade_on_empty = true
        placeholder_text = <span foreground="##cdd6f4">Password</span>
        hide_input = false
    }

    label {
        monitor =
        text = <span foreground="##cdd6f4">Locked</span>
        font_size = 30
        font_family = sans-serif
        position = 0, 100
        halign = center
        valign = center
    }
